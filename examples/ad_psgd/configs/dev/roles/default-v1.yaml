client.*:
  trainer: # role instance name
    class: ad_psgd.roles.trainer.MyEpochTrainer
    impl:
      model:
        loader:
          method: factory
          target: ad_psgd.workload.lenet_5.MyLeNet5RGBModel
          args:
            lr: 0.01
            device: cpu
            num_threads: 4
      dataset:
        loader:
          method: factory
          target: roleml.library.workload.datasets.views.DatasetViewFactory
          args:
            dataset:
              type: ad_psgd.workload.cifar_10.MyCiFar10SlicedDataset
              options:
                root: /home/roleml/datasets/cifar-10/sliced
                index: $c[0-9]
            converters: [roleml.library.workload.datasets.zoo.image.cifar_10.functions.transform_torch]
            sampler: sequential
            batch_size: 32
            combiner: roleml.library.workload.datasets.zoo.image.cifar_10.functions.combine
      dataset_test:
        loader:
          method: factory
          target: roleml.library.workload.datasets.views.DatasetViewFactory
          args:
            dataset:
              type: ad_psgd.workload.cifar_10.MyCiFar10Dataset
              options:
                root: /home/roleml/datasets/cifar-10
                part: test
            converters: [roleml.library.workload.datasets.zoo.image.cifar_10.functions.transform_torch]
            sampler: sequential
            combiner: roleml.library.workload.datasets.zoo.image.cifar_10.functions.combine
        eager_load: True

client(1|2|3|4|5):
  aggregator:
    class: ad_psgd.roles.active_aggregator.AdAggregator
  coordinator:
    class: ad_psgd.roles.active_coordinator.AdCoordinator

client(6|7|8|9|10):
  aggregator:
    class: ad_psgd.roles.passive_aggregator.AdAggregator
    impl:
      merge-op:
        loader:
          method: direct-import
          target: ad_psgd.workload.ops.drop_local
  coordinator:
    class: ad_psgd.roles.passive_coordinator_v1.AdCoordinator
